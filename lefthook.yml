pre-commit:
  parallel: true
  commands:
    api-lint:
      root: api/
      glob: "*.py"
      run: uv run ruff check {staged_files} && uv run ruff format --check {staged_files}
    api-typecheck:
      root: api/
      run: uv run ty check src/
    ui-check:
      root: ui/
      glob: "*.{ts,tsx}"
      run: pnpm biome check client/
    # Catches stale struct-literal alignment + import order without
    # running the whole test suite. gofmt -l prints any unformatted
    # file; if the output is non-empty, fail the commit.
    daemon-fmt:
      root: daemon/
      glob: "*.go"
      run: |
        out=$(gofmt -l {staged_files})
        if [ -n "$out" ]; then
          echo "gofmt would reformat the following files — run 'gofmt -w' on them:"
          echo "$out"
          exit 1
        fi
    # `flutter analyze` is the Dart equivalent of biome — runs in <2s
    # on the touched files alone and catches a long tail of
    # diagnostics (unused imports, type warnings, deprecated API).
    companion-analyze:
      root: companion/
      glob: "*.dart"
      run: flutter analyze {staged_files}

pre-push:
  commands:
    api-test:
      root: api/
      run: uv run pytest src/ -x -q
    ui-typecheck:
      root: ui/
      run: pnpm typecheck
    ui-test:
      root: ui/
      run: pnpm test
    ui-api-types:
      root: ui/
      run: pnpm gen:types:check
    # The daemon's tests cover the Go client, the cmd/beatsd dispatch
    # arms, the editor listener, the autotimer / shield logic, and
    # the collector scorer. Without this hook a Go-only regression
    # could land on main and only surface when someone tries to
    # build a release.
    daemon-test:
      root: daemon/
      run: go test ./...
    # `go vet` catches a different class of issue from the test suite
    # (printf format mismatches, struct-tag typos, lock-by-value).
    # Cheap to run, real safety net.
    daemon-vet:
      root: daemon/
      run: go vet ./...
    # The companion has 110+ unit/widget tests covering api_client
    # (request shape + error envelope parsing), tag parsing, recent
    # projects, notification dedupe, repo-path display, the pairing
    # widget, bundle labels, and insights URL building. Without this
    # hook a Dart-only regression would land silently — same gap
    # daemon-test closed for the Go side.
    companion-test:
      root: companion/
      run: flutter test
    # The VS Code extension uses node --test (built-in, no framework
    # dep) for its pure-helper tests — covers buildInsightsUrl, the
    # status-bar formatter, and parity assertions that keep the
    # formatter in lockstep with the daemon and companion equivalents.
    # Any new helper extracted from extension.ts gets caught here for
    # free.
    vscode-extension-test:
      root: integrations/vscode-beats/
      glob: "*.{ts,json}"
      run: npm test
