name: Release Daemon
# Triggers on tag push (e.g. `git tag v0.1.0 && git push --tags`).
# Cross-compiles the daemon for darwin and linux on both arm64 and amd64,
# packages each as a tar.gz, and attaches them to a GitHub release.
#
# These binaries are what the Homebrew formula at
# integrations/homebrew-formula/beatsd.rb downloads — once the
# homebrew-beats tap repo exists, bumping the formula's URL + sha256 to
# a new release here is the entire upgrade path for users.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub release

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    # darwin builds run on macOS so the cgo cadence event tap
    # (cadence_darwin.go) links against the native CGEventTap; it cannot
    # be cross-compiled from Linux. linux stays on ubuntu, statically linked.
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      # cgo on for the darwin cadence tap; off elsewhere to stay static.
      CGO_ENABLED: ${{ matrix.goos == 'darwin' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o beatsd ./cmd/beatsd/

      - name: Package
        run: |
          tar czf "beatsd-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" beatsd
          shasum -a 256 "beatsd-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            > "beatsd-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: beatsd-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            daemon/beatsd-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            daemon/beatsd-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifacts
        # actions/download-artifact restores each upload to its own subdir;
        # the release action wants a flat list of files.
        run: |
          mkdir -p dist
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) \
            -exec mv {} dist/ \;
          ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            Cross-compiled `beatsd` binaries for darwin and linux
            (arm64 + amd64). SHA256 sums next to each tarball.

            Homebrew users: `brew upgrade beatsd` once the tap formula is
            bumped. Manual install:

            ```bash
            curl -L -o beatsd.tar.gz \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/beatsd-darwin-arm64.tar.gz
            tar xzf beatsd.tar.gz
            ./beatsd version
            ```
