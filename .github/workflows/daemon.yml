name: Daemon
on:
  push:
    paths: [daemon/**]
  pull_request:
    paths: [daemon/**]

jobs:
  quality:
    name: Vet & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go vet ./...
      - run: go test ./... -v -race

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    defaults:
      run:
        working-directory: daemon
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go build -o beatsd-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/beatsd/
      - uses: actions/upload-artifact@v4
        with:
          name: beatsd-${{ matrix.goos }}-${{ matrix.goarch }}
          path: daemon/beatsd-${{ matrix.goos }}-${{ matrix.goarch }}
