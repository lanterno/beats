name: Daemon
on:
  push:
    paths: [daemon/**]
  pull_request:
    paths: [daemon/**]

jobs:
  quality:
    name: Vet & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      # gofmt is enforced locally via lefthook, but a contributor
      # without the hook installed could push unformatted Go through
      # to CI otherwise. `gofmt -l` prints any unformatted file; if
      # the output is non-empty, fail the run with a clear message.
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt would reformat the following files — run 'gofmt -w .' on them:"
            echo "$out"
            exit 1
          fi
      - run: go vet ./...
      - run: go test ./... -v -race

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: quality
    # darwin builds run on macOS so the cgo cadence event tap
    # (cadence_darwin.go) compiles; cross-compiling darwin from Linux
    # with CGO_ENABLED=0 drops that file and breaks the build.
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      # cgo on for darwin (native macOS clang); off for the pure-Go
      # linux stub so it stays statically linked.
      CGO_ENABLED: ${{ matrix.goos == 'darwin' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go build -o beatsd-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/beatsd/
      - uses: actions/upload-artifact@v4
        with:
          name: beatsd-${{ matrix.goos }}-${{ matrix.goarch }}
          path: daemon/beatsd-${{ matrix.goos }}-${{ matrix.goarch }}
