name: Companion
on:
  push:
    paths: [companion/**]
  pull_request:
    paths: [companion/**]

jobs:
  quality:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-web:
    name: Build Web
    needs: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web
      - uses: actions/upload-artifact@v4
        with:
          name: companion-web
          path: companion/build/web

  build-android:
    name: Build Android (APK)
    needs: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: companion-android
          path: companion/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS (no codesign)
    needs: quality
    runs-on: macos-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

  build-macos:
    name: Build macOS
    needs: quality
    runs-on: macos-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: companion-macos
          path: companion/build/macos/Build/Products/Release/*.app

  build-linux:
    name: Build Linux
    needs: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: companion-linux
          path: companion/build/linux/x64/release/bundle

  build-windows:
    name: Build Windows
    needs: quality
    runs-on: windows-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: companion-windows
          path: companion/build/windows/x64/runner/Release
